<!DOCTYPE html>
<html>
<head>
  <title>Spotify Clone</title>
<style>
    body {
    background: linear-gradient(135deg, #94e0af, #706c6c);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    }

    .card {
    background: #20ad35;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    width: 300px;
    }

    input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    border: none;
    }

    button {
    background: #70cf92;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    }
</style>
</head>
<body>
  <div class="card">
    <h2>Spotify Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

<script>
    async function login() {
    const formData = new URLSearchParams();
    formData.append("username", email.value); 
    formData.append("password", password.value);

    const res = await fetch("/login", {
        method: "POST",
        headers: {
        "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData
    });

    const data = await res.json();

    if (data.access_token) {
        localStorage.setItem("token", data.access_token);
        window.location.href = "/frontend/songs.html";
    } else {
        alert("Login failed");
    }
    }
</script>
